name: release

on:
  push:
    tags: ["v*"]

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install package + dev deps
        run: uv pip install --system -e ".[dev]"

      - name: Ruff
        run: ruff check src/ tests/

      - name: Mypy
        run: mypy src/conscio/

      - name: Pytest
        run: python -m pytest tests/

      - name: Docs consistency
        run: sh scripts/check-docs-examples.sh

      - name: Web assets committed
        run: test -f src/conscio/static/index.html

      - name: Tag matches pyproject version
        run: |
          python -c 'import tomllib, os, sys
          v = tomllib.load(open("pyproject.toml", "rb"))["project"]["version"]
          t = os.environ["GITHUB_REF_NAME"].removeprefix("v")
          sys.exit(0 if v == t else print(f"tag {t} != pyproject {v}") or 1)'

  pypi:
    needs: gate
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        run: pip install uv

      - name: Build sdist and wheel
        run: uv build

      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1

  ghcr:
    needs: gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/libertai/conscio
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
