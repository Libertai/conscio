# Expects a TLS reverse proxy (e.g. Caddy — see deploy/grit-carry-state-false/Caddyfile)
# in front of the loopback port map below. Secure cookies are on; browsers treat
# http://127.0.0.1 as a secure context, so local testing still works.
services:
  conscio:
    build: .
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8765/ready', timeout=5).status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    ports:
      - "127.0.0.1:8765:8765"
    volumes:
      - conscio_home:/home/conscio/.conscio
      - ./work:/opt/conscio/work
    environment:
      - CONSCIO_CONFIG=/home/conscio/.conscio/config.toml
      - CONSCIO_HOST=0.0.0.0
      - CONSCIO_CLIENT_URL=http://127.0.0.1:8765
      - CONSCIO_API_KEY=${CONSCIO_API_KEY:?set CONSCIO_API_KEY}
      - CONSCIO_WEB_PASSWORD=${CONSCIO_WEB_PASSWORD:?set CONSCIO_WEB_PASSWORD}
      - CONSCIO_WEB_SECURE_COOKIES=1
      # - CONSCIO_TRUSTED_PROXIES=127.0.0.1

volumes:
  conscio_home:
