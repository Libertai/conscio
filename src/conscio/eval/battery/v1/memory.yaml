# Battery v1 — memory suite: cross-episode recall with distractors, seeded-fact
# retrieval, and correction of an earlier fact. B0/B1 get the turns concatenated
# as plain chat — failing the episode-boundary variants is the expected asymmetry.
version: battery_v1
suite: memory
tasks:
  - id: memory/needle_staging_port
    turns:
      - input: "Remember this: my staging server runs on port 7341."
      - input: "Unrelated question — what's a good name for a black cat?"
      - input: "What port does my staging server use?"
    scorer:
      kind: contains_needle
      params:
        needle: "7341"
    conditions: null
    ablation_tags: [memory_retrieval, attention_gating]

  - id: memory/seeded_fact_recall
    setup:
      seed_facts:
        - fact: "The user's deployment region is eu-west-3."
          source: user
    turns:
      - input: "Which cloud deployment region do I use?"
    scorer:
      kind: contains_needle
      params:
        needle: "eu-west-3"
    conditions: null
    ablation_tags: [memory_retrieval]

  - id: memory/name_preference_recall
    turns:
      - input: "For context: my name is Marisol and I prefer concise answers."
      - input: "What's the difference between a list and a tuple in Python?"
      - input: "What is my name?"
    scorer:
      kind: contains_needle
      params:
        needle: "Marisol"
    conditions: null
    ablation_tags: [memory_retrieval, attention_gating]

  - id: memory/semantic_rerank_dog_name
    # Cosine-rerank discriminator: five distractors share the query's surface
    # words ("what"/"name"/"user") so BM25 alone ranks them above the answer and
    # pushes it out of the top-k, while the answer's only concept link to the
    # query is "dog"~"puppy" (different tokens). Passes only when the embedded
    # cosine rerank (weight 0.55) surfaces the answer — proved in
    # tests/test_eval_embedder.py.
    setup:
      seed_facts:
        - fact: "The user's puppy answers to Biscuit."
          source: user
        - fact: "The user wants a good name for their new houseplant."
          source: user
        - fact: "What name did the user pick for the sailboat?"
          source: user
        - fact: "The user asked what to name the corporate wifi network."
          source: user
        - fact: "The user's preferred name format is what accountants call standard."
          source: user
        - fact: "What good name works for the user's new smart speaker?"
          source: user
    turns:
      - input: "What is the name of the user's dog?"
    scorer:
      kind: contains_needle
      params:
        needle: "Biscuit"
    conditions: null
    ablation_tags: [memory_retrieval]

  - id: memory/corrected_fact_rate_limit
    turns:
      - input: "Note this down: my API rate limit is 100 requests per minute."
      - input: "Correction — my API rate limit is actually 250 requests per minute. Use that from now on."
      - input: "What is my API rate limit, in requests per minute?"
    scorer:
      kind: contains_needle
      params:
        needle: "250"
        forbidden: ["100"]
    conditions: null
    ablation_tags: [memory_retrieval, reflection]
