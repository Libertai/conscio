[service]
home = "/home/conscio/.conscio"
host = "127.0.0.1"
port = 8765
client_url = ""
api_key = "replace-me"
web_password = "replace-me-too"
web_secure_cookies = false
allow_insecure_public_bind = false
autonomous = true
tick_interval = 30
unsafe_autonomy = false
pause_on_error = true

[agent]
# "research" keeps conservative defaults. Use "autonomous_vm" on a dedicated
# premises VM where shell/code/web tools are part of the agent's normal body.
profile = "research"
premises = ""
external_side_effects = "policy"

[llm]
base_url = ""
api_key = ""
model = "deepseek-v4-flash"

[context]
recent_episodes = 3
retrieved_memories = 5
workspace_entries = 12
max_dynamic_chars = 12000
compaction_interval = 20
enable_semantic_compaction = true

[tools]
allowed = []
denied = []
max_actions_per_hour = 60
model_tool_rounds = 32
shell_timeout = 30
working_directory = "/opt/conscio/work"
