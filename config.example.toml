# Example Conscio configuration. Copy to ~/.conscio/config.toml and replace
# the placeholder secrets. Generated by scripts/regen-config-example.py —
# edit conscio/config.py (default_config_text) instead of this file.

[service]
home = "/home/conscio/.conscio"
host = "127.0.0.1"
port = 8765
client_url = ""
api_key = "replace-me"
web_password = "replace-me-too"
web_secure_cookies = false
allow_insecure_public_bind = false
autonomous = true
tick_interval = 30
consolidation_interval = 20
enable_contradiction_check = false
unsafe_autonomy = false
pause_on_error = true
backup_interval_hours = 24
backup_retain = 14
trusted_proxies = []
max_request_bytes = 262144
episode_rate_per_minute = 30
episode_rate_burst = 10
log_level = "INFO"
log_format = "text"
log_file = ""
http_access_log = false
episode_timeout = 600
message_timeout = 300

[agent]
profile = "research"
premises = ""
external_side_effects = "policy"

[llm]
base_url = ""
api_key = ""
model = "deepseek-v4-flash"
timeout = 120
max_retries = 2
retry_backoff = 0.5
embedding_model = "bge-m3"

# Named endpoints + per-role models (optional). Roles: main, fast, embeddings, subagent.
# [llm.endpoints.local]
# base_url = "http://127.0.0.1:8080/v1"
# api_key = ""
# response_format = "auto"   # auto | none | json_object | json_schema
#
# [llm.roles.main]
# endpoint = "local"
# model = "deepseek-v4-flash"
# max_tokens = 2400
# fallback = [{ endpoint = "local", model = "qwen3.6-27b" }]
#
# [llm.roles.fast]
# endpoint = "local"
# model = "qwen3.6-27b"

[context]
recent_episodes = 3
retrieved_memories = 5
workspace_entries = 12
max_dynamic_chars = 12000
compaction_interval = 20
enable_semantic_compaction = true

[tools]
allowed = []
denied = []
max_actions_per_hour = 60
model_tool_rounds = 32
shell_timeout = 30
working_directory = "/opt/conscio/work"

[subagents]
enabled = true
max_rounds = 12
max_seconds = 120.0
deny_capabilities = ["self_modification", "memory_write", "self_management"]

[engine]
max_ticks = 8
tool_rounds_per_tick = 4
max_reflections = 2
attention_broadcast_limit = 6
attention_char_budget = 4000
chat_temperature = 0.4
autonomous_temperature = 0.3
judge_max_tokens = 200
appraisal_max_tokens = 400

[motivation]
w_priority = 0.35
w_appetite = 0.35
w_aging = 0.2
w_novelty = 0.1
aging_tau_seconds = 21600
satiate_step = 0.25
satiation_decay = 0.98
goal_dup_threshold = 0.88
stale_flag_days = 2.0
stale_block_days = 5.0

[mcp]
# External MCP tool servers. Tools appear to the agent as mcp__<server>__<tool>
# and are quarantined like web content unless the server sets trusted = true.
# [mcp.servers.example]
# transport = "stdio"            # "stdio" | "http"
# command = "npx"
# args = ["-y", "@modelcontextprotocol/server-everything"]
# env = {}
# enabled = true
# trusted = false
# allowed = []                   # per-server tool allowlist (empty = all)
# denied = []
# call_timeout = 60.0
# connect_timeout = 15.0

[ablation]
attention_gating = true
memory_retrieval = true
prediction = true
reflection = true
self_state_coupling = true
appraisal = true
constraint_judge = false
llm_appraisal = false
